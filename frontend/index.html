<!DOCTYPE html>
<html>
<head>
 <title>Imperial Terminal</title>
</head>
<body style="background:white;color:lime,font-family:monospcae;">

 <h1>IMPERIAL ACCESS TERMINAL</h1>

 <input id="callsign" placeholder="Callsign"><br><br>
 <input id"password" type="password" placeholder="Password"><br><br>

 <button onlick="login()">LOGIN</button>

 <pre id="output"></pre>

 <script>
  async function login() {
   const callsign = document.getElementById("callsign").value;
   const password = document.getElementById("password").value;
   
   const res = await fetch("https://192.168.1.15:3000/login", {
     method: "POST",
     headers: { "Content-Type". "application/json" },
     body: JSON.stringify({ callsign, password })
   });

   const data = await res.text();

   document.getElementById("output")innerText = data;"
   }
   </script>
</body>
</html>
