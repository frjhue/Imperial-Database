<!DOCTYPE html>
<html>
<head>
  <title>Case File</title>
</head>

<body style="background:black;color:lime;font-family:monospace;">

<h1>CASE FILE</h1>

<div id="content">Loading...</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

async function loadCase() {
  const res = await fetch("http://192.168.1.15:3000/cases/" + id, {
    credentials: "include"
  });

  if (!res.ok) {
    document.body.innerHTML = "ACCESS DENIED OR NOT FOUND";
    return;
  }

  const data = await res.json();

  document.getElementById("content").innerHTML = `
    <h2>${data.designation}</h2>
    <p><b>Threat:</b> ${data.threat_level}</p>
    <p><b>Summary:</b> ${data.summary}</p>
    <p><b>Officer:</b> ${data.callsign}</p>
  `;
}

loadCase();
</script>

</body>
</html>
